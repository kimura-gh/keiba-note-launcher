<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="NOTE更新">
<meta name="theme-color" content="#0b0c0f"><link rel="manifest" href="manifest.webmanifest">
<title>NOTE更新</title>
<style>body{margin:0;background:#0b0c0f;color:#fff;font-family:-apple-system,sans-serif;display:grid;place-items:center;min-height:100vh}main{text-align:center;padding:24px}button{border:0;border-radius:14px;background:#4f8cff;color:#fff;font-size:18px;font-weight:700;padding:14px 28px}.error{color:#ff7a84}</style>
</head><body><main><h1>NOTE更新</h1><p id="status">Macへ接続しています…</p><button id="retry" hidden>再試行</button></main>
<script>
const statusElement=document.getElementById('status');const retryButton=document.getElementById('retry');
async function connect(){retryButton.hidden=true;statusElement.className='';statusElement.textContent='Macへ接続しています…';
try{const response=await fetch('./endpoint.json?t='+Date.now(),{cache:'no-store'});if(!response.ok)throw new Error('endpoint');
const data=await response.json();if(!/^https:\/\/[a-z0-9-]+\.trycloudflare\.com$/.test(data.url||''))throw new Error('url');
location.replace(data.url+'/');}catch(error){statusElement.className='error';statusElement.textContent='接続先を取得できません';retryButton.hidden=false;}}
retryButton.addEventListener('click',connect);connect();
</script></body></html>
