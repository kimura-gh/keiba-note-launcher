<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="NOTE更新">
<meta name="theme-color" content="#0b0c0f"><link rel="manifest" href="manifest.webmanifest">
<title>NOTE更新</title>
<style>body{margin:0;background:#0b0c0f;color:#fff;font-family:-apple-system,sans-serif;display:grid;place-items:center;min-height:100vh}main{text-align:center;padding:24px}button{border:0;border-radius:14px;background:#4f8cff;color:#fff;font-size:18px;font-weight:700;padding:14px 28px}.waiting{color:#9ba7ba}.error{color:#ff7a84}</style>
</head><body><main><h1>NOTE更新</h1><p id="status">Macへ接続しています…</p><button id="retry" hidden>再試行</button></main>
<script>
(() => {
  /*
   * 目的:
   * iPhoneのホーム画面に登録済みの固定ランチャーから、URLが変わらないCloudflare Worker版NOTE更新へ接続する。
   * 引数:
   * なし。ブラウザの表示状態、オンライン状態、固定Workerのhealth APIを使用する。
   * 戻り値:
   * なし。health確認後に現在の画面を固定Worker版NOTE更新へ置き換える。
   * エラー時の動作:
   * Mac停止中、ネット切断中、health確認失敗時は無効な画面へ遷移せず、3秒後に自動再試行する。
   * 補足:
   * 一時的なtrycloudflare URLはブラウザへ渡さない。pageshow、オンライン復帰、画面再表示でも接続確認する。
   */
  const stableAppUrl = "https://keiba-mobile-control.marble-pickup-dca.workers.dev/";
  const statusElement = document.getElementById("status");
  const retryButton = document.getElementById("retry");
  let retryTimer = null;
  let connectActive = false;

  /*
   * 目的:
   * health確認が応答しない場合に、指定時間で通信を中断して再試行へ移行する。
   * 引数:
   * urlは確認先URL、optionsはfetch設定、timeoutMsは中断までのミリ秒。
   * 戻り値:
   * fetchのResponseをPromiseで返す。
   * エラー時の動作:
   * タイムアウト時はAbortError、通信失敗時はfetch由来の例外を呼び出し元へ返す。
   * 補足:
   * 完了時は成否にかかわらずタイマーを解除する。
   */
  const fetchWithTimeout = async (url, options, timeoutMs) => {
    const controller = new AbortController();
    const timeoutId = window.setTimeout(() => controller.abort(), timeoutMs);
    try {
      return await fetch(url, {...options, signal: controller.signal});
    } finally {
      window.clearTimeout(timeoutId);
    }
  };

  /*
   * 目的:
   * 接続失敗後の自動再試行を1件だけ予約する。
   * 引数:
   * なし。
   * 戻り値:
   * なし。
   * エラー時の動作:
   * 例外は発生させず、既存タイマーを解除してから再予約する。
   * 補足:
   * 3秒後にconnectを呼び出す。
   */
  const scheduleRetry = () => {
    if (retryTimer) window.clearTimeout(retryTimer);
    retryTimer = window.setTimeout(connect, 3000);
  };

  /*
   * 目的:
   * 固定Workerの稼働を確認し、NOTE更新画面へ安全に遷移する。
   * 引数:
   * なし。
   * 戻り値:
   * Promise<void>。遷移成功時は現在の履歴を置き換える。
   * エラー時の動作:
   * 利用者向け待機表示へ切り替え、3秒後の自動再試行を予約する。
   * 補足:
   * 非表示中および多重実行中は処理しない。成功するまで固定GitHub Pages上に留まる。
   */
  const connect = async () => {
    if (connectActive || document.visibilityState !== "visible") return;
    connectActive = true;
    if (retryTimer) window.clearTimeout(retryTimer);
    retryTimer = null;
    retryButton.hidden = true;
    statusElement.className = "waiting";
    statusElement.textContent = "Macへ接続しています…";
    try {
      const healthUrl = new URL("health", stableAppUrl);
      healthUrl.searchParams.set("t", String(Date.now()));
      const healthResponse = await fetchWithTimeout(
        healthUrl.toString(),
        {cache: "no-store", credentials: "omit", mode: "cors"},
        8000,
      );
      if (!healthResponse.ok) throw new Error(`health HTTP ${healthResponse.status}`);
      window.location.replace(`${stableAppUrl}?launcher=1`);
    } catch (_error) {
      statusElement.className = "error";
      statusElement.textContent = navigator.onLine
        ? "Macの起動を待っています。自動で再接続します…"
        : "ネット接続を待っています。自動で再接続します…";
      retryButton.hidden = false;
      scheduleRetry();
    } finally {
      connectActive = false;
    }
  };

  retryButton.addEventListener("click", connect);
  window.addEventListener("pageshow", connect);
  window.addEventListener("online", connect);
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") connect();
  });
  connect();
})();
</script></body></html>
