<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#101923"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="予想作成"><title>予想作成</title><link rel="manifest" href="./manifest.webmanifest"><link rel="icon" href="./icon-512.png"><link rel="apple-touch-icon" href="./icon-512.png"><style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#091016}body{min-height:100svh;display:grid;place-items:center;padding:calc(22px + env(safe-area-inset-top)) 22px calc(22px + env(safe-area-inset-bottom));font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;color:#f7f1e7;background:radial-gradient(circle at 14% 0,rgba(60,91,111,.9) 0,transparent 40%),radial-gradient(circle at 90% 90%,rgba(174,130,48,.16) 0,transparent 38%),linear-gradient(150deg,#101923,#091016 72%)}.card{width:min(100%,390px);padding:28px 22px 24px;border:1px solid rgba(255,255,255,.1);border-radius:25px;background:rgba(15,25,34,.92);box-shadow:0 28px 70px rgba(0,0,0,.38);text-align:center}.title{margin:0;font-size:29px}.sub{margin:12px auto 0;max-width:290px;color:#aeb9c2;font-size:14px;line-height:1.75}.state{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:27px;padding:14px;border:1px solid #2d3d49;border-radius:15px;background:#0b131a;color:#c7d0d6;font-size:13px}.spinner{width:18px;height:18px;border:2px solid #384956;border-top-color:#d5b871;border-radius:50%;animation:spin .9s linear infinite}.state.ready .spinner{border:0;background:#55cf91;animation:none}.hint{margin:16px 0 0;color:#687984;font-size:11px;line-height:1.65}@keyframes spin{to{transform:rotate(1turn)}}
</style></head><body><main class="card"><h1 class="title">予想作成</h1><p class="sub">Mac上の作成画面へ接続しています。</p><div id="state" class="state"><span class="spinner"></span><span id="stateText">接続先を確認中</span></div><p class="hint">Macの起動直後は接続まで少し時間がかかります。<br>この画面のまま自動で再接続します。</p></main><script>
/*
 * === Predictor固定ランチャー自動接続処理 ===
 * 目的:
 * NOTE更新と共有するendpoint.jsonから現在のQuick Tunnelを取得し、同じトンネルの`/predictor`へ自動接続する。
 * 引数:
 * なし。親ディレクトリのendpoint.jsonとブラウザの表示・オンライン状態を使用する。
 * 戻り値:
 * なし。接続確認後に現在のブラウザ画面を公開中の予想作成画面へ置き換える。
 * エラー時の動作:
 * endpoint取得、URL検証、Predictor health確認の失敗時は3秒後に再試行し、無効URLへ遷移しない。
 * 補足:
 * 親ディレクトリのendpoint.jsonはNOTEトンネル監督だけが更新し、PINや予測データを含まない。
 * pageshow、オンライン復帰、画面再表示でも確認し、バックグラウンド中は通信しない。
 */
(()=>{const endpoint='../endpoint.json';const pattern=/^https:\/\/[a-z0-9-]+\.trycloudflare\.com$/;const state=document.getElementById('state');const text=document.getElementById('stateText');let timer=0;let connecting=false;function show(message,ready=false){text.textContent=message;state.classList.toggle('ready',ready)}async function timedFetch(url){const controller=new AbortController();const timeout=setTimeout(()=>controller.abort(),6000);try{return await fetch(url,{cache:'no-store',signal:controller.signal})}finally{clearTimeout(timeout)}}function retry(message){show(message);clearTimeout(timer);timer=setTimeout(connect,3000)}async function connect(){if(connecting||document.visibilityState==='hidden')return;connecting=true;clearTimeout(timer);show('接続先を確認中');try{const endpointResponse=await timedFetch(`${endpoint}?t=${Date.now()}`);if(!endpointResponse.ok)throw new Error('endpoint');const payload=await endpointResponse.json();const tunnel=String(payload.url||'').replace(/\/$/,'');if(!pattern.test(tunnel))throw new Error('url');show('Macへ接続中');const health=await timedFetch(`${tunnel}/predictor/health?t=${Date.now()}`);if(!health.ok)throw new Error('health');show('接続しました',true);window.location.replace(`${tunnel}/predictor/?source=launcher&t=${Date.now()}`)}catch(_error){retry(navigator.onLine?'Macの起動を待っています':'ネット接続を待っています')}finally{connecting=false}}document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')connect()});window.addEventListener('pageshow',connect);window.addEventListener('online',connect);connect()})();
</script></body></html>
